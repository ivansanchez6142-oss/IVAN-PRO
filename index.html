    const COLORS = ['#0088FE', '#00C49F', '#FFBB28', '#FF8042', '#8884d8', '#82ca9d', '#ffc658', '#8dd1e1'];

    const initialIntervals = {

    const initialStats = {

    let firebaseConfig = {

    const Icons = {

      Trash2: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" /></svg>,

      Save: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M16.5 3.75V16.5L12 14.25 7.5 16.5V3.75m9 0H18A2.25 2.25 0 0120.25 6v12A2.25 2.25 0 0118 20.25H6A2.25 2.25 0 013.75 18V6A2.25 2.25 0 016 3.75h1.5m9 0h-9" /></svg>,
      Settings: ({ className }) => <svg className={`w-5 h-5 ${className}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.43l-1.003.828c-.293.241-.438.613-.43.992a7.723 7.723 0 010 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.43l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.991l-1.004-.827a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.28z" /><circle cx="12" cy="12" r="3" strokeLinecap="round" strokeLinejoin="round" /></svg>,
      Users: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.109A11.386 11.386 0 0112.001 21c-2.21 0-4.26-.63-6.002-1.724v-.109m0 .109A11.356 11.356 0 013 16.5c0-1.9 1.12-3.53 2.724-4.262m0 0A4.6 4.6 0 004.625 10.5c0 1.25.5 2.388 1.3 3.2M12 12.75a5.25 5.25 0 110-10.5 5.25 5.25 0 010 10.5z" /></svg>,
      Trophy: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M16.5 18.75h-9m9 0a3 3 0 013 3h-15a3 3 0 013-3m9 0v-3.375c0-.621-.503-1.125-1.125-1.125h-6.75a1.125 1.125 0 01-1.125-1.125V18.75m9 0h-9M12 3v1.5M12 18.75V15" /></svg>,
      ChevronDown: ({ className }) => <svg className={`w-4 h-4 ${className}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>,
      Award: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" /></svg>,
      Sparkles: () => <svg className="w-4 h-4 text-yellow-500 inline mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9.813 15.904L9 21l-.813-5.096L3 15l5.187-.813L9 9l.813 5.187L15 15l-5.187.813zM19.071 4.929l-.707 1.414-1.414.707 1.414.707.707 1.414.707-1.414 1.414-.707-1.414-.707-.707-1.414z" /></svg>,
      Map: () => <svg className="w-6 h-6 text-blue-900" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 6.75V15m6-4.25V18m-9-3.75h.008v.008H6v-.008zm12-4.25h.008v.008H18v-.008zm-6-2.5h.008v.008H12V7.25zm0 11.5h.008v.008H12v-.008z" /></svg>,
      ShieldCheck: () => <svg className="w-4 h-4 text-blue-500 inline mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296 3.745 3.745 0 01-3.296 1.043A3.745 3.745 0 0112 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 01-3.296-1.043 3.745 3.745 0 01-1.043-3.296a3.745 3.745 0 0121 12z" /></svg>,
      Loader: () => (
        <svg className="animate-spin h-10 w-10 text-blue-900 mx-auto" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
          <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      )
    };

    const SafeResponsiveContainer = ({ children, height = 300 }) => {
      const containerRef = useRef(null);
      const [size, setSize] = useState({ width: 0, height });

      useEffect(() => {
        if (!containerRef.current) return;

        const resizeObserver = new ResizeObserver((entries) => {
          if (!entries || !entries[0]) return;
          const rect = entries[0].contentRect;
          if (rect.width > 0) {
            setSize({
              width: Math.floor(rect.width),
              height: rect.height > 0 ? Math.floor(rect.height) : height
            });
          }
        });

        resizeObserver.observe(containerRef.current);
        return () => resizeObserver.disconnect();
      }, [height]);

      return (
        <div ref={containerRef} className="w-full relative" style={{ height }}>
          {size.width > 0 && React.cloneElement(children, { width: size.width, height: size.height })}
        </div>
      );
    };

    const App = () => {
      const [activeTab, setActiveTab] = useState('stats');
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [onlineStatus, setOnlineStatus] = useState(navigator.onLine);
      const [isUsingNube, setIsUsingNube] = useState(true);
      
      const [teams, setTeams] = useState([]);
      const [seasons, setSeasons] = useState([]);
      const [selectedTeamId, setSelectedTeamId] = useState('');
      const [selectedSeasonId, setSelectedSeasonId] = useState('');
      const [matches, setMatches] = useState([]);

      const [showConfig, setShowConfig] = useState(false);
      const [newTeamName, setNewTeamName] = useState('');
      const [newSeasonName, setNewSeasonName] = useState('');
      
      const [tacticalView, setTacticalView] = useState('offensive');

      const [newMatch, setNewMatch] = useState({
        date: '', time: '', place: '', opponent: '', location: 'Local', ourGoals: 0, opponentGoals: 0,
        offensive: { ...initialStats },
        defensive: { ...initialStats },
        intervalsOffensive: { ...initialIntervals },
        intervalsDefensive: { ...initialIntervals }
      });

      useEffect(() => {
        const handleOnline = () => setOnlineStatus(true);
        const handleOffline = () => setOnlineStatus(false);
        window.addEventListener('online', handleOnline);
        window.addEventListener('offline', handleOffline);
        return () => {
          window.removeEventListener('online', handleOnline);
          window.removeEventListener('offline', handleOffline);
        };
      }, []);

      // Autenticación fluida sin demoras
      useEffect(() => {
        if (!isUsingNube) {
          setUser({ uid: 'local_user', displayName: 'Iván' });
          setLoading(false);
          return;
        }

        const safetyTimeout = setTimeout(() => {
          if (loading) {
            setUser({ uid: 'local_user', displayName: 'Iván' });
            setLoading(false);
          }
        }, 2000);

        const initAuth = async () => {
          try {
            await authInstance.signInAnonymously();
          } catch (error) { 
            console.error("Auth error:", error); 
            setUser({ uid: 'local_user', displayName: 'Iván' });
            setLoading(false);
          }
        };
        initAuth();

        const unsubscribe = authInstance.onAuthStateChanged((currentUser) => {
          clearTimeout(safetyTimeout);
          if (currentUser) {
            setUser(currentUser);
          } else {
            setUser({ uid: 'local_user', displayName: 'Iván' });
          }
          setLoading(false);
        });

        return () => {
          clearTimeout(safetyTimeout);
          unsubscribe();
        };
      }, [isUsingNube]);

      // ==========================================
      // 📡 RUTAS FIJAS SINO ASIGNADAS (Sincronización Total)
      // ==========================================
      const getTeamsRef = () => dbInstance.collection('gestion_ivan').doc('datos').collection('teams');
      const getSeasonsRef = () => dbInstance.collection('gestion_ivan').doc('datos').collection('seasons');
      const getMatchesRef = () => dbInstance.collection('gestion_ivan').doc('datos').collection('matches');

      // Escucha de Equipos en Tiempo Real
      useEffect(() => {
        if (!isUsingNube || !dbInstance) {
          const localTeams = JSON.parse(localStorage.getItem('ivan_pro_teams') || '[]');
          setTeams(localTeams);
          if (localTeams.length > 0 && !selectedTeamId) setSelectedTeamId(localTeams[0].id);
          return;
        }

        const unsubscribe = getTeamsRef().onSnapshot((snapshot) => {
          const teamsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setTeams(teamsData);
          if (teamsData.length > 0 && !selectedTeamId) setSelectedTeamId(teamsData[0].id);
        }, (err) => {
          console.error("Error en nube de equipos, pasando a local:", err);
          const localTeams = JSON.parse(localStorage.getItem('ivan_pro_teams') || '[]');
          setTeams(localTeams);
          if (localTeams.length > 0 && !selectedTeamId) setSelectedTeamId(localTeams[0].id);
        });

        return () => unsubscribe();
      }, [isUsingNube]);

      // Escucha de Temporadas en Tiempo Real
      useEffect(() => {
        if (!selectedTeamId) {
          setSeasons([]);
          return;
        }

        if (!isUsingNube || !dbInstance) {
          const localSeasons = JSON.parse(localStorage.getItem('ivan_pro_seasons') || '[]');
          const filtered = localSeasons.filter(s => s.teamId === selectedTeamId);
          setSeasons(filtered);
          if (filtered.length > 0 && !selectedSeasonId) setSelectedSeasonId(filtered[0].id);
          return;
        }

        const unsubscribe = getSeasonsRef().onSnapshot((snapshot) => {
          const seasonsData = snapshot.docs
            .map(doc => ({ id: doc.id, ...doc.data() }))
            .filter(s => s.teamId === selectedTeamId);
          setSeasons(seasonsData);
          if (seasonsData.length > 0 && !selectedSeasonId) setSelectedSeasonId(seasonsData[0].id);
        }, (err) => {
          const localSeasons = JSON.parse(localStorage.getItem('ivan_pro_seasons') || '[]');
          const filtered = localSeasons.filter(s => s.teamId === selectedTeamId);
          setSeasons(filtered);
        });

        return () => unsubscribe();
      }, [selectedTeamId, isUsingNube]);

      // Escucha de Partidos en Tiempo Real
      useEffect(() => {
        if (!selectedTeamId || !selectedSeasonId) {
          setMatches([]);
          return;
        }

        if (!isUsingNube || !dbInstance) {
          const localMatches = JSON.parse(localStorage.getItem('ivan_pro_matches') || '[]');
          const filtered = localMatches.filter(m => m.teamId === selectedTeamId && m.seasonId === selectedSeasonId);
          setMatches(filtered);
          return;
        }

        const unsubscribe = getMatchesRef().onSnapshot((snapshot) => {
          const matchesData = snapshot.docs
            .map(doc => ({ id: doc.id, ...doc.data() }))
            .filter(m => m.teamId === selectedTeamId && m.seasonId === selectedSeasonId);
          setMatches(matchesData);
        }, (err) => {
          const localMatches = JSON.parse(localStorage.getItem('ivan_pro_matches') || '[]');
          const filtered = localMatches.filter(m => m.teamId === selectedTeamId && m.seasonId === selectedSeasonId);
          setMatches(filtered);
        });

        return () => unsubscribe();
      }, [selectedTeamId, selectedSeasonId, isUsingNube]);

      const handleMatchChange = (category, field, value) => {
        if (category === 'main') {
          setNewMatch(prev => ({ 
            ...prev, 
            [field]: (field === 'ourGoals' || field === 'opponentGoals') ? (value === '' ? '' : parseInt(value) || 0) : value 
          }));
        } else {
          setNewMatch(prev => ({
            ...prev,
            [category]: {
              ...prev[category],
              [field]: value === '' ? '' : parseInt(value) || 0
            }
          }));
        }
      };

      const handleIncrement = (category, field, amount) => {
        if (category === 'main') {
          const current = parseInt(newMatch[field]) || 0;
          const next = Math.max(0, current + amount);
          handleMatchChange('main', field, next);
        } else {
          const current = parseInt(newMatch[category][field]) || 0;
          const next = Math.max(0, current + amount);
          handleMatchChange(category, field, next);
        }
      };

      const addTeam = async () => {
        if (!newTeamName.trim()) return;
        const newTeam = { name: newTeamName, createdAt: new Date().toISOString() };

        try {
          if (isUsingNube && dbInstance) {
            await getTeamsRef().add(newTeam);
          } else {
            const localTeams = JSON.parse(localStorage.getItem('ivan_pro_teams') || '[]');
            const newTeamLocal = { id: 'team_' + Date.now(), ...newTeam };
            localTeams.push(newTeamLocal);
            localStorage.setItem('ivan_pro_teams', JSON.stringify(localTeams));
            setTeams(localTeams);
            if (!selectedTeamId) setSelectedTeamId(newTeamLocal.id);
          }
          setNewTeamName('');
        } catch (e) {
          console.error("Error al guardar equipo:", e);
        }
      };

      const addSeason = async () => {
        if (!newSeasonName.trim() || !selectedTeamId) return;
        const newSeason = { name: newSeasonName, teamId: selectedTeamId, createdAt: new Date().toISOString() };

        try {
          if (isUsingNube && dbInstance) {
            await getSeasonsRef().add(newSeason);
          } else {
            const localSeasons = JSON.parse(localStorage.getItem('ivan_pro_seasons') || '[]');
            const newSeasonLocal = { id: 'season_' + Date.now(), ...newSeason };
            localSeasons.push(newSeasonLocal);
            localStorage.setItem('ivan_pro_seasons', JSON.stringify(localSeasons));
            const filtered = localSeasons.filter(s => s.teamId === selectedTeamId);
            setSeasons(filtered);
            if (!selectedSeasonId) setSelectedSeasonId(newSeasonLocal.id);
          }
          setNewSeasonName('');
        } catch (e) {
          console.error("Error al guardar temporada:", e);
        }
      };

      const saveMatch = async () => {
        if (!selectedTeamId || !selectedSeasonId) return;
        if (!newMatch.date || !newMatch.opponent) return;
        
        const matchToSave = {
          ...newMatch,
          teamId: selectedTeamId,
          seasonId: selectedSeasonId,
          ourGoals: Number(newMatch.ourGoals) || 0,
          opponentGoals: Number(newMatch.opponentGoals) || 0,
          offensive: Object.fromEntries(Object.entries(newMatch.offensive).map(([k, v]) => [k, Number(v) || 0])),
          defensive: Object.fromEntries(Object.entries(newMatch.defensive).map(([k, v]) => [k, Number(v) || 0])),
          intervalsOffensive: Object.fromEntries(Object.entries(newMatch.intervalsOffensive || initialIntervals).map(([k, v]) => [k, Number(v) || 0])),
          intervalsDefensive: Object.fromEntries(Object.entries(newMatch.intervalsDefensive || initialIntervals).map(([k, v]) => [k, Number(v) || 0])),
          createdAt: new Date().toISOString()
        };

        try {
          if (isUsingNube && dbInstance) {
            await getMatchesRef().add(matchToSave);
          } else {
            const localMatches = JSON.parse(localStorage.getItem('ivan_pro_matches') || '[]');
            const newMatchLocal = { id: 'match_' + Date.now(), ...matchToSave };
            localMatches.push(newMatchLocal);
            localStorage.setItem('ivan_pro_matches', JSON.stringify(localMatches));
            const filtered = localMatches.filter(m => m.teamId === selectedTeamId && m.seasonId === selectedSeasonId);
            setMatches(filtered);
          }
        } catch (e) {
          console.error("Error al guardar partido:", e);
        }
        
        setNewMatch({
          date: '', time: '', place: '', opponent: '', location: 'Local', ourGoals: 0, opponentGoals: 0,
          offensive: { ...initialStats },
          defensive: { ...initialStats },
          intervalsOffensive: { ...initialIntervals },
          intervalsDefensive: { ...initialIntervals }
        });
      };

      const deleteMatch = async (id) => {
        try {
          if (isUsingNube && dbInstance) {
            await getMatchesRef().doc(id).delete();
          } else {
            const localMatches = JSON.parse(localStorage.getItem('ivan_pro_matches') || '[]');
            const filtered = localMatches.filter(m => m.id !== id);
            localStorage.setItem('ivan_pro_matches', JSON.stringify(filtered));
            setMatches(filtered.filter(m => m.teamId === selectedTeamId && m.seasonId === selectedSeasonId));
          }
        } catch (e) {
          console.error(e);
        }
      };

      const deleteTeam = async (id) => {
        try {
          if (isUsingNube && dbInstance) {
            await getTeamsRef().doc(id).delete();
          } else {
            const localTeams = JSON.parse(localStorage.getItem('ivan_pro_teams') || '[]');
            const filtered = localTeams.filter(t => t.id !== id);
            localStorage.setItem('ivan_pro_teams', JSON.stringify(filtered));
            setTeams(filtered);
          }
        } catch (e) {
          console.error(e);
        }
        if (selectedTeamId === id) setSelectedTeamId('');
      };

      const deleteSeason = async (id) => {
        try {
          if (isUsingNube && dbInstance) {
            await getSeasonsRef().doc(id).delete();
          } else {
            const localSeasons = JSON.parse(localStorage.getItem('ivan_pro_seasons') || '[]');
            const filtered = localSeasons.filter(s => s.id !== id);
            localStorage.setItem('ivan_pro_seasons', JSON.stringify(filtered));
            setSeasons(filtered.filter(s => s.teamId === selectedTeamId));
          }
        } catch (e) {
          console.error(e);
        }
        if (selectedSeasonId === id) setSelectedSeasonId('');
      };

      const performanceData = useMemo(() => {
        return [...matches]
          .sort((a, b) => new Date(a.date) - new Date(b.date))
          .map((m, index) => {
            const og = Number(m.ourGoals) || 0;
            const dg = Number(m.opponentGoals) || 0;
            let resultado = 'Empate';
            let codigoRes = 'E';
            if (og > dg) {
              resultado = 'Victoria';
              codigoRes = 'G';
            } else if (og < dg) {
              resultado = 'Derrota';
              codigoRes = 'P';
            }
            return {
              name: `PJ ${index + 1}`,
              fullDate: m.date,
              opponent: m.opponent,
              goles: og,
              recibidos: dg,
              resultado: resultado,
              codigoRes: codigoRes
            };
          });
      }, [matches]);

      const collectiveKPIs = useMemo(() => {
        const totalMatches = matches.length;
        if (totalMatches === 0) {
          return {
            totalGoalsScored: 0, totalGoalsConceded: 0, cleanSheets: 0, cleanSheetsPct: '0%', undefeatedStreak: 0
          };
        }

        let totalScored = 0, totalConceded = 0, cleanSheets = 0, currentUndefeated = 0, maxUndefeated = 0;
        const sorted = [...matches].sort((a, b) => new Date(a.date) - new Date(b.date));

        sorted.forEach(m => {
          const og = Number(m.ourGoals) || 0;
          const dg = Number(m.opponentGoals) || 0;
          totalScored += og;
          totalConceded += dg;
          if (dg === 0) cleanSheets++;

          if (og >= dg) {
            currentUndefeated++;
            if (currentUndefeated > maxUndefeated) maxUndefeated = currentUndefeated;
          } else {
            currentUndefeated = 0;
          }
        });

        return {
          totalGoalsScored: totalScored,
          totalGoalsConceded: totalConceded,
          cleanSheets,
          cleanSheetsPct: `${Math.round((cleanSheets / totalMatches) * 100)}%`,
          undefeatedStreak: currentUndefeated
        };
      }, [matches]);

      // Render básico para que veas el estado de la app
      if (loading) {
        return (
          <div className="flex items-center justify-content h-screen bg-slate-900 text-white">
            <div className="text-center">
              <Icons.Loader />
              <p className="mt-4 text-lg font-bold">Armando el vestuario táctico...</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col font-sans">
          {/* Header de Estado */}
          <header className="bg-blue-900 text-white px-4 py-3 flex justify-between items-center shadow-md">
            <div>
              <h1 className="text-xl font-black tracking-tight">IVÁN PRO <span className="text-xs font-normal bg-blue-700 px-2 py-0.5 rounded ml-2">v2026.Sincro</span></h1>
              <p className="text-xs text-blue-200">Prof. Educación Física & Director Técnico</p>
            </div>
            
            <div className="flex items-center gap-3">
              <div className={`text-xs px-2 py-1 rounded font-bold flex items-center gap-1 ${onlineStatus ? 'bg-emerald-600 text-white' : 'bg-amber-600 text-white'}`}>
                <span className="w-2 h-2 rounded-full bg-white animate-pulse"></span>
                {onlineStatus ? 'En la nube: Conectado' : 'Modo Offline (Cancha)'}
              </div>
              <button onClick={() => setShowConfig(!showConfig)} className="p-2 bg-blue-800 rounded-full hover:bg-blue-700">
                <Icons.Settings className={showConfig ? "animate-spin-slow" : ""} />
              </button>
            </div>
          </header>

          <main className="flex-1 p-4 max-w-7xl w-full mx-auto grid grid-cols-1 md:grid-cols-4 gap-4">
            
            {/* Panel de Configuración e Ingreso Lateral */}
            <div className={`md:col-span-1 bg-white p-4 rounded-xl shadow border border-slate-200 flex flex-col gap-4 ${showConfig ? 'block' : 'hidden md:block'}`}>
              
              {/* Sección Equipos */}
              <div>
                <label className="block text-xs font-black text-slate-500 uppercase mb-1">Seleccionar Equipo</label>
                <div className="flex gap-2 mb-2">
                  <select 
                    className="w-full bg-slate-100 p-2 rounded border border-slate-300 text-sm font-bold"
                    value={selectedTeamId}
                    onChange={(e) => setSelectedTeamId(e.target.value)}
                  >
                    <option value="">-- Seleccionar Equipo --</option>
                    {teams.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                  </select>
                </div>
                <div className="flex gap-1">
                  <input 
                    type="text" 
                    placeholder="Nuevo Equipo..." 
                    className="w-full bg-slate-50 p-1.5 text-xs rounded border border-slate-300"
                    value={newTeamName}
                    onChange={(e) => setNewTeamName(e.target.value)}
                  />
                  <button onClick={addTeam} className="p-1.5 bg-blue-900 text-white rounded hover:bg-blue-800"><Icons.Plus /></button>
                </div>
                {selectedTeamId && (
                  <button onClick={() => deleteTeam(selectedTeamId)} className="text-red-600 text-xs mt-1 font-bold flex items-center gap-1">
                    <Icons.Trash2 /> Eliminar equipo seleccionado
                  </button>
                )}
              </div>

              <hr />

              {/* Sección Temporadas */}
              <div>
                <label className="block text-xs font-black text-slate-500 uppercase mb-1">Temporada o Torneo</label>
                <select 
                  className="w-full bg-slate-100 p-2 rounded border border-slate-300 text-sm font-bold mb-2"
                  value={selectedSeasonId}
                  onChange={(e) => setSelectedSeasonId(e.target.value)}
                  disabled={!selectedTeamId}
                >
                  <option value="">-- Seleccionar Torneo --</option>
                  {seasons.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
                <div className="flex gap-1">
                  <input 
                    type="text" 
                    placeholder="Nuevo Torneo/Grado..." 
                    className="w-full bg-slate-50 p-1.5 text-xs rounded border border-slate-300"
                    value={newSeasonName}
                    onChange={(e) => setNewSeasonName(e.target.value)}
                    disabled={!selectedTeamId}
                  />
                  <button onClick={addSeason} className="p-1.5 bg-blue-900 text-white rounded hover:bg-blue-800" disabled={!selectedTeamIdContainer}><Icons.Plus /></button>
                </div>
                {selectedSeasonId && (
                  <button onClick={() => deleteSeason(selectedSeasonId)} className="text-red-600 text-xs mt-1 font-bold flex items-center gap-1">
                    <Icons.Trash2 /> Eliminar torneo seleccionado
                  </button>
                )}
              </div>

              <hr />

              {/* Formulario Rápido de Partido */}
              {selectedTeamId && selectedSeasonId ? (
                <div className="flex flex-col gap-2">
                  <h3 className="text-xs font-black text-slate-700 uppercase">Cargar Partido Rápido</h3>
                  <input type="date" className="bg-slate-50 p-1.5 text-xs rounded border" value={newMatch.date} onChange={(e) => handleMatchChange('main', 'date', e.target.value)} />
                  <input type="text" placeholder="Rival..." className="bg-slate-50 p-1.5 text-xs rounded border" value={newMatch.opponent} onChange={(e) => handleMatchChange('main', 'opponent', e.target.value)} />
                  
                  <div className="grid grid-cols-2 gap-2 mt-1">
                    <div className="text-center bg-slate-100 p-1 rounded">
                      <span className="text-[10px] font-bold text-blue-900 block">Goles Propios</span>
                      <div className="flex items-center justify-center gap-1">
                        <button onClick={() => handleIncrement('main', 'ourGoals', -1)} className="px-1 bg-slate-300 rounded text-xs">-</button>
                        <span className="font-bold text-sm">{newMatch.ourGoals}</span>
                        <button onClick={() => handleIncrement('main', 'ourGoals', 1)} className="px-1 bg-slate-300 rounded text-xs">+</button>
                      </div>
                    </div>
                    <div className="text-center bg-slate-100 p-1 rounded">
                      <span className="text-[10px] font-bold text-red-900 block">Goles Rival</span>
                      <div className="flex items-center justify-center gap-1">
                        <button onClick={() => handleIncrement('main', 'opponentGoals', -1)} className="px-1 bg-slate-300 rounded text-xs">-</button>
                        <span className="font-bold text-sm">{newMatch.opponentGoals}</span>
                        <button onClick={() => handleIncrement('main', 'opponentGoals', 1)} className="px-1 bg-slate-300 rounded text-xs">+</button>
                      </div>
                    </div>
                  </div>

                  <button onClick={saveMatch} className="w-full mt-2 bg-emerald-600 text-white p-2 rounded text-xs font-bold hover:bg-emerald-700 flex justify-center items-center gap-1">
                    <Icons.Save /> Guardar Partido
                  </button>
                </div>
              ) : (
                <p className="text-xs text-slate-400 text-center italic">Seleccioná equipo y torneo para operar.</p>
              )}
            </div>

            {/* Espacio del Dashboard y Gráficos */}
            <div className="md:col-span-3 bg-white p-4 rounded-xl shadow border border-slate-200">
              {matches.length === 0 ? (
                <div className="text-center py-20">
                  <Icons.Trophy />
                  <h3 className="mt-4 text-lg font-black text-slate-700">Sin partidos cargados</h3>
                  <p className="text-sm text-slate-400">Cargá tu primer partido en el panel izquierdo para ver analíticas en tiempo real.</p>
                </div>
              ) : (
                <div>
                  <h2 className="text-sm font-black text-slate-700 uppercase mb-3">Rendimiento Colectivo Actual</h2>
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4">
                    <div className="bg-blue-50 p-3 rounded-lg border border-blue-200 text-center">
                      <span className="text-xs text-blue-700 font-bold block">Goles a Favor</span>
                      <span className="text-2xl font-black text-blue-900">{collectiveKPIs.totalGoalsScored}</span>
                    </div>
                    <div className="bg-red-50 p-3 rounded-lg border border-red-200 text-center">
                      <span className="text-xs text-red-700 font-bold block">Goles en Contra</span>
                      <span className="text-2xl font-black text-red-900">{collectiveKPIs.totalGoalsConceded}</span>
                    </div>
                    <div className="bg-emerald-50 p-3 rounded-lg border border-emerald-200 text-center">
                      <span className="text-xs text-emerald-700 font-bold block">Vallas Invictas</span>
                      <span className="text-2xl font-black text-emerald-900">{collectiveKPIs.cleanSheets} ({collectiveKPIs.cleanSheetsPct})</span>
                    </div>
                    <div className="bg-slate-100 p-3 rounded-lg border border-slate-300 text-center">
                      <span className="text-xs text-slate-700 font-bold block">Racha Invicto</span>
                      <span className="text-2xl font-black text-slate-800">{collectiveKPIs.undefeatedStreak} <span className="text-xs font-normal">Partidos</span></span>
                    </div>
                  </div>

                  <hr className="my-4" />

                  <h3 className="text-xs font-black text-slate-500 uppercase mb-2">Evolución de Goles</h3>
                  <SafeResponsiveContainer height={250}>
                    <AreaChart data={performanceData}>
                      <CartesianGrid strokeDasharray="3 3" />
                      <XAxis dataKey="name" />
                      <YAxis />
                      <Tooltip />
                      <Legend />
                      <Area type="monotone" dataKey="goles" stroke="#1e3a8a" fill="#3b82f6" fillOpacity={0.6} name="A Favor" />
                      <Area type="monotone" dataKey="recibidos" stroke="#b91c1c" fill="#f87171" fillOpacity={0.4} name="En Contra" />
                    </AreaChart>
                  </SafeResponsiveContainer>

                  <div className="mt-4">
                    <h3 className="text-xs font-black text-slate-500 uppercase mb-2">Historial de Partidos</h3>
                    <div className="max-h-40 overflow-y-auto border rounded divide-y">
                      {matches.map(m => (
                        <div key={m.id} className="p-2 text-xs flex justify-between items-center hover:bg-slate-50">
                          <div>
                            <span className="font-bold text-slate-700">{m.date}</span> - vs <span className="font-black text-blue-900">{m.opponent}</span>
                          </div>
                          <div className="flex items-center gap-3">
                            <span className="font-black px-2 py-0.5 bg-slate-200 rounded">{m.ourGoals} - {m.opponentGoals}</span>
                            <button onClick={() => deleteMatch(m.id)} className="text-red-500 hover:text-red-700">
                              <Icons.Trash2 />
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}
            </div>
          </main>
        </div>
      );
    };

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
